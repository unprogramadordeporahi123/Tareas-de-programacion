<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ejemplo de la estructura global de un documento HTML">
    <title>Mi pagina web</title>
</head>
<body>

<h1>Mi pagina web</h1>

<h2>Mi nombre es Daniel Guerra</h2>

<p>Soy un programador de 16 años que le gustan los videojuegos y programar cosas en python</p>

 <form action="/enviar" method="POST">
        <fieldset>
            <legend>Tus Datos Personales</legend>

            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required><br><br>

            <label for="email">Correo Electrónico</label><br>
            <input type="email" id="email" name="email" placeholder="Tucorreo@gmail.com"><br><br>

            <label for="contraseña">Contraseña</label><br>
            <input type="password" id="Contraseña" name="contraseña"><br><br>

            <label for="fecha">Fecha de Nacimiento</label><br>
            <input type="date" id="fecha" name="fecha"><br><br>
        </fieldset>

        <fieldset>
            <legend>Preferencias</legend>

            <p>Género:</p>
            <input type="radio" id="masculino" name="genero" value="masculino">
            <label for="masculino">Masculino</label><br>
            <input type="radio" id="femenino" name="genero" value="femenino">
            <label for="femenino">Femenino</label><br><br>

            <input type="checkbox" id="terminos" name="terminos y condiciones" checked>
            <label for="suscripcion">Terminos y condiciones</label><br><br>
</html>
